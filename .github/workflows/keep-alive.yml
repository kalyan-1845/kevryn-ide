name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 14 minutes, Monday through Friday
    # During weekends it will naturally sleep to save free tier hours!
    # Customize the days here: 1-5 means Mon-Fri. 
    # Example: "*/14 * * * 1-5" (every 14 mins, Mon-Fri)
    # Example: "*/14 8-20 * * 1-5" (every 14 mins, between 8 AM and 8 PM, Mon-Fri)
    - cron: "*/14 * * * 1-5"
    
  # Allows you to trigger it manually from the GitHub website
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Route
        # Replace the URL below with your actual Render URL later
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://kevryn-ide.onrender.com/health || echo "Ping failed"
