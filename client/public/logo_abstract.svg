<svg viewBox="0 0 512 512" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="grad-magenta" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF007A" />
      <stop offset="100%" stop-color="#7928CA" />
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#0055FF" />
    </linearGradient>
    <linearGradient id="glass-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.2)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>
    <linearGradient id="glass-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.7)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.1)" />
    </linearGradient>
    
    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="ambient-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur" />
    </filter>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="512" height="512" fill="#06070B" />
  <rect width="512" height="512" fill="url(#grid)" />

  <!-- Ambient Glow Behind Logo -->
  <circle cx="256" cy="256" r="140" fill="#0055FF" filter="url(#ambient-glow)" opacity="0.35" />
  <circle cx="256" cy="256" r="100" fill="#FF007A" filter="url(#ambient-glow)" opacity="0.25" />

  <g transform="translate(23, 56)">
    <!-- 1. Upper Arm (Behind layer) -->
    <g filter="url(#glow)">
      <polygon points="136,282 320,98 320,30 136,214" fill="url(#grad-magenta)" />
      <line x1="136" y1="214" x2="320" y2="30" stroke="#FFFFFF" stroke-width="2" opacity="0.4" />
    </g>

    <!-- 2. Core Stem -->
    <g filter="url(#glow)">
      <rect x="136" y="60" width="48" height="280" rx="12" fill="url(#grad-blue)" />
      <path d="M 136 72 V 328" stroke="#FFFFFF" stroke-width="2" opacity="0.4" />
    </g>

    <!-- 3. R-Loop -->
    <g filter="url(#glow)">
      <path d="M 160 80 H 260 A 70 70 0 0 1 330 150 A 70 70 0 0 1 260 220 H 160 V 172 H 260 A 22 22 0 0 0 282 150 A 22 22 0 0 0 260 128 H 160 Z" fill="url(#grad-blue)" />
    </g>

    <!-- 4. Glassmorphic Lower Leg (Front Layer) -->
    <g style="backdrop-filter: blur(12px);">
      <polygon points="136,186 320,370 320,302 136,118" fill="url(#glass-fill)" stroke="url(#glass-stroke)" stroke-width="2" />
      <polyline points="136,118 320,302 320,370" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8" />
    </g>

    <!-- 5. Tech Accent Nodes -->
    <circle cx="136" cy="282" r="5" fill="#FF007A" filter="url(#glow)" />
    <circle cx="320" cy="30" r="5" fill="#7928CA" filter="url(#glow)" />
    <circle cx="320" cy="370" r="6" fill="#FFF" filter="url(#glow)" />
    <circle cx="260" cy="150" r="10" fill="none" stroke="#00E5FF" stroke-width="3" filter="url(#glow)" />
    <circle cx="260" cy="150" r="3" fill="#FFF" />
    <circle cx="136" cy="118" r="4" fill="#FFF" filter="url(#glow)" />
  </g>
</svg>
