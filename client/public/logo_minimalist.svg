<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="slate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <linearGradient id="electric" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0072FF" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Transparent background for versatility -->
  <rect width="100%" height="100%" fill="transparent" />

  <g transform="translate(0, -20)">
    <!-- K - Deep Slate (Matte/Solid) -->
    <g stroke-linecap="round" stroke-linejoin="round" stroke-width="44" fill="none" filter="url(#shadow)">
      <path d="M 290,200 L 290,400" stroke="url(#slate)" />
      <path d="M 370,200 L 290,300 L 370,400" stroke="url(#slate)" />
    </g>

    <!-- R - Electric Blue (Glowing/Dynamic) -->
    <g stroke-linecap="round" stroke-linejoin="round" stroke-width="44" fill="none" filter="url(#glow)">
      <!-- Traced as one continuous line: spine up, loop right, leg down -->
      <path d="M 430,400 L 430,200 A 80,50 0 0,1 430,300 L 510,400" stroke="url(#electric)" />
    </g>
  </g>

  <!-- Typography -->
  <text x="405" y="520" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="34" letter-spacing="14">
    <tspan font-weight="800" fill="#0f172a">KEVRYN</tspan>
    <tspan font-weight="300" fill="#0072FF"> IDE</tspan>
  </text>
</svg>
