<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    
    <!-- Brackets Gradients -->
    <linearGradient id="bracketLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bracketRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Text Gradient (K & R) -->
    <linearGradient id="textGrad" x1="171" y1="180" x2="351" y2="332" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>
  
  <g filter="url(#glow)">
    <!-- Brackets -->
    <path d="M 115 180 L 55 256 L 115 332" fill="none" stroke="url(#bracketLeft)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 397 180 L 457 256 L 397 332" fill="none" stroke="url(#bracketRight)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- K-R Symbol -->
    <!-- K Stem -->
    <path d="M 171 180 L 171 332" fill="none" stroke="url(#textGrad)" stroke-width="32" stroke-linecap="round"/>
    <!-- K Top Arm -->
    <path d="M 231 180 L 171 256" fill="none" stroke="url(#textGrad)" stroke-width="32" stroke-linecap="round"/>
    <!-- Ligature (K bottom arm to R stem bottom) -->
    <path d="M 171 256 L 231 332 L 271 332" fill="none" stroke="url(#textGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- R Stem -->
    <path d="M 271 180 L 271 332" fill="none" stroke="url(#textGrad)" stroke-width="32" stroke-linecap="round"/>
    <!-- R Loop -->
    <path d="M 271 180 L 311 180 C 351 180, 351 256, 311 256 L 271 256" fill="none" stroke="url(#textGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- R Leg -->
    <path d="M 301 256 L 341 332" fill="none" stroke="url(#textGrad)" stroke-width="32" stroke-linecap="round"/>

    <!-- Tech Nodes (Inner Pins) -->
    <g fill="#ffffff">
      <!-- Brackets -->
      <circle cx="115" cy="180" r="8" />
      <circle cx="55" cy="256" r="8" />
      <circle cx="115" cy="332" r="8" />
      
      <circle cx="397" cy="180" r="8" />
      <circle cx="457" cy="256" r="8" />
      <circle cx="397" cy="332" r="8" />

      <!-- K -->
      <circle cx="171" cy="180" r="8" />
      <circle cx="171" cy="256" r="8" />
      <circle cx="171" cy="332" r="8" />
      <circle cx="231" cy="180" r="8" />
      
      <!-- Ligature Junction -->
      <circle cx="231" cy="332" r="8" />
      
      <!-- R -->
      <circle cx="271" cy="180" r="8" />
      <circle cx="271" cy="256" r="8" />
      <circle cx="271" cy="332" r="8" />
      <circle cx="311" cy="180" r="8" />
      <circle cx="311" cy="256" r="8" />
      <circle cx="341" cy="332" r="8" />
    </g>
  </g>
</svg>
