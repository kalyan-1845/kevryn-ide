<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FA709A" />
      <stop offset="100%" stop-color="#FEE140" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667EEA" />
      <stop offset="100%" stop-color="#764BA2" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <g filter="url(#neonGlow)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left vertical stem (shared by K and R) -->
    <line x1="160" y1="144" x2="160" y2="368" stroke="url(#primaryGrad)" stroke-width="48" />
    
    <!-- Top loop of R -->
    <path d="M 160 144 h 80 c 70 0, 70 120, 0 120 h -80" fill="none" stroke="url(#secondaryGrad)" stroke-width="48" />
    
    <!-- Top diagonal of K -->
    <line x1="230" y1="204" x2="320" y2="130" stroke="url(#accentGrad)" stroke-width="48" />
    
    <!-- Bottom diagonal (shared by K and R) -->
    <line x1="210" y1="264" x2="320" y2="380" stroke="url(#accentGrad)" stroke-width="48" />
  </g>
</svg>